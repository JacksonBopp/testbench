name: Hardware Validation

on:
  # Run manually from the Actions tab with a custom timeout
  workflow_dispatch:
    inputs:
      timeout:
        description: 'Test timeout in seconds'
        default: '120'
        required: false

  # Uncomment once TESTBENCH_URL is set and testbench is publicly reachable:
  # push:
  #   branches: [main, master]
  #   paths:
  #     - 'firmware/**'
  # pull_request:
  #   paths:
  #     - 'firmware/**'

jobs:
  validate:
    name: Run hardware test suite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Skip entirely if the secret isn't configured rather than failing
    if: ${{ secrets.TESTBENCH_URL != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Trigger hardware test
        id: hardware_test
        env:
          TESTBENCH_URL: ${{ secrets.TESTBENCH_URL }}
        run: |
          TIMEOUT_MS=$(( ${{ inputs.timeout || 120 }} * 1000 ))

          echo "Triggering testbench run for firmware ${{ github.sha }}"

          RESULT=$(curl -sf \
            --max-time $(( ${{ inputs.timeout || 120 }} + 10 )) \
            -X POST "${TESTBENCH_URL}/api/webhook/run" \
            -H "Content-Type: application/json" \
            -d "{
              \"firmwareVersion\": \"${{ github.sha }}\",
              \"hardwareId\": \"msp430-01\",
              \"notes\": \"CI: ${{ github.ref }} — ${{ github.event.head_commit.message }}\",
              \"timeout\": ${TIMEOUT_MS}
            }")

          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" | jq .

      - name: Evaluate result
        run: |
          RESULT='${{ steps.hardware_test.outputs.result }}'
          STATUS=$(echo "$RESULT" | jq -r '.status')
          PASSED=$(echo "$RESULT" | jq -r '.passed // 0')
          FAILED=$(echo "$RESULT" | jq -r '.failed // 0')
          RUN_ID=$(echo "$RESULT" | jq -r '.runId')

          echo "Run ID:  $RUN_ID"
          echo "Status:  $STATUS"
          echo "Passed:  $PASSED steps"
          echo "Failed:  $FAILED steps"

          if [ "$STATUS" = "timeout" ]; then
            echo "::error::Hardware test timed out — is the device connected and subscriber running?"
            exit 1
          fi

          if [ "$FAILED" -gt "0" ]; then
            echo "::error::$FAILED step(s) failed. See ${TESTBENCH_URL}/test-runs/$RUN_ID"
            echo "$RESULT" | jq '.steps[] | select(.status == "failed")'
            exit 1
          fi

          echo "::notice::All $PASSED steps passed for firmware ${{ github.sha }}"
