name: Hardware Validation

on:
  workflow_dispatch:
    inputs:
      timeout:
        description: 'Test timeout in seconds'
        default: '120'
        required: false

  # Uncomment once TESTBENCH_URL secret is set and testbench is deployed:
  # push:
  #   branches: [main, master]
  #   paths: [firmware/**]
  # pull_request:
  #   paths: [firmware/**]

jobs:
  validate:
    name: Run hardware test suite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Run hardware validation
        env:
          TESTBENCH_URL: ${{ secrets.TESTBENCH_URL }}
        run: |
          if [ -z "$TESTBENCH_URL" ]; then
            echo "::notice::TESTBENCH_URL secret not set — skipping hardware validation."
            echo "Add TESTBENCH_URL in Settings > Secrets and variables > Actions."
            exit 0
          fi

          TIMEOUT_MS=$(( ${{ inputs.timeout || 120 }} * 1000 ))
          echo "Triggering testbench run for firmware ${{ github.sha }}"

          RESULT=$(curl -sf \
            --max-time $(( ${{ inputs.timeout || 120 }} + 10 )) \
            -X POST "${TESTBENCH_URL}/api/webhook/run" \
            -H "Content-Type: application/json" \
            -d "{
              \"firmwareVersion\": \"${{ github.sha }}\",
              \"hardwareId\": \"msp430-01\",
              \"notes\": \"CI: ${{ github.ref }}\",
              \"timeout\": ${TIMEOUT_MS}
            }")

          echo "$RESULT" | jq .

          STATUS=$(echo "$RESULT" | jq -r '.status')
          PASSED=$(echo "$RESULT" | jq -r '.passed // 0')
          FAILED=$(echo "$RESULT" | jq -r '.failed // 0')
          RUN_ID=$(echo "$RESULT" | jq -r '.runId')

          echo "Run: $RUN_ID | Status: $STATUS | Passed: $PASSED | Failed: $FAILED"

          if [ "$STATUS" = "timeout" ]; then
            echo "::error::Hardware test timed out — is the device connected and subscriber running?"
            exit 1
          fi

          if [ "$FAILED" -gt "0" ]; then
            echo "::error::$FAILED step(s) failed. See ${TESTBENCH_URL}/test-runs/$RUN_ID"
            echo "$RESULT" | jq '.steps[] | select(.status == "failed")'
            exit 1
          fi

          echo "::notice::All $PASSED steps passed for ${{ github.sha }}"
